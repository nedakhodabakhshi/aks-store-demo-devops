trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: store-front
  containerRegistry: acraksstoredemo12345.azurecr.io
  dockerfilePath: Dockerfile
  tag: $(Build.BuildId)

stages:

- stage: Build
  displayName: Build and Push Image

  jobs:
  - job: Build
    displayName: Build Docker Image

    steps:

    - task: Docker@2
      displayName: Build and Push
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: acr-store-connection
        tags: |
          $(tag)

- stage: Deploy
  displayName: Deploy to AKS

  jobs:
  - job: Deploy
    displayName: Deploy Application

    steps:

    - task: KubernetesManifest@1
      displayName: Deploy to AKS
      inputs:
        action: deploy
        connectionType: azureResourceManager
        azureSubscriptionConnection: aks-store-demo-connection
        azureResourceGroup: rg-aks-store-demo
        kubernetesCluster: aks-store-demo-cluster
        namespace: dev
        manifests: |
          charts/aks-store-demo/templates/store-front.yaml
