trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: store-front
  containerRegistry: acraksstoredemo12345.azurecr.io
  dockerfilePath: src/store-front/Dockerfile
  tag: $(Build.BuildId)

stages:

- stage: Build
  displayName: Build and Push Image

  jobs:
  - job: Build
    displayName: Build Docker Image

    steps:

    - task: Docker@2
      displayName: Build and Push
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: acr-store-connection
        tags: |
          $(tag)

- stage: Deploy
  displayName: Deploy to AKS

  jobs:
  - job: Deploy
    displayName: Deploy Application

    steps:

    - task: HelmInstaller@1
      inputs:
        helmVersionToInstall: 'latest'

    - task: HelmDeploy@0
      displayName: Helm Deploy
      inputs:
        connectionType: 'Azure Resource Manager'
        azureSubscription: 'aks-store-demo-connection'
        azureResourceGroup: 'rg-aks-store-demo'
        kubernetesCluster: 'aks-store-demo-cluster'
        namespace: 'dev'
        command: 'upgrade'
        chartType: 'FilePath'
        chartPath: 'charts/aks-store-demo'
        releaseName: 'aks-store-demo'
        overrideValues: |
          storeFront.image.repository=acraksstoredemo12345.azurecr.io/store-front
          storeFront.image.tag=$(Build.BuildId)