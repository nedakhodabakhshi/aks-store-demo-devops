apiVersion: apps/v1
kind: Deployment

metadata:
  name: store-front

spec:
  replicas: 1

  selector:
    matchLabels:
      app: store-front

  template:
    metadata:
      labels:
        app: store-front

    spec:
      nodeSelector:
        "kubernetes.io/os": linux

      containers:
      - name: store-front

        image: "{{ .Values.storeFront.image.repository }}:{{ .Values.storeFront.image.tag | default .Chart.AppVersion }}"

        ports:
        - containerPort: 8080
          name: store-front

        resources:
          requests:
            cpu: 1m
            memory: 200Mi

          limits:
            cpu: 1000m
            memory: 512Mi